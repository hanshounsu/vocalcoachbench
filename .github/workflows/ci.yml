name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Compile
        run: python -m py_compile vocalcoachbench/*.py
      - name: Run examples
        run: scripts/run_examples.sh
